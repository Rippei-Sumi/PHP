<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Katatchi祭 アカウント登録</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #155f7f;
      font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      position: relative;
    }

    .container {
      width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 50px;
    }

    .input-box {
      width: 100%;
      padding: 16px;
      margin-bottom: 25px;
      font-size: 16px;
      border: 2px solid #7bc043;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .register-button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      background-color: #5cab2f;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .register-button:hover {
      opacity: 0.9;
    }

    /* 戻るリンク */
    .back-link {
      position: absolute;
      bottom: 40px;
      left: 40px;
      display: flex;
      align-items: center;
      color: #ffffff;
      text-decoration: none;
      font-size: 16px;
    }

    .back-link span {
      font-size: 32px;
      margin-right: 10px;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Katatchi祭 アカウント登録（来場者用）</h1>

    <form action="register.php" method="post">
      <input
        type="email"
        name="email"
        class="input-box"
        placeholder="メールアドレス"
        required
      >
    
      <input
        type="password"
        name="password"
        class="input-box"
        placeholder="パスワード"
        required
      >
    
      <button type="submit" class="register-button">
        新規登録
      </button>
    </form>
  </div>

  <a href="user_login.php" class="back-link">
    <span>↩</span>
    ログイン画面へ戻る
  </a>

</body>
</html>
